name: Eval Harness

on:
  # Nightly at 02:00 UTC
  schedule:
    - cron: '0 2 * * *'
  # On PRs touching regulations, evals, or core graph code
  pull_request:
    paths:
      - 'packages/core/regulations/**'
      - 'packages/evals/**'
      - 'packages/core/src/graph/**'
      - 'packages/core/src/config/yaml-schema.ts'
      - 'packages/core/src/config/regulation-loader.ts'
      - 'scripts/check-graph-quality.mjs'
  # Manual trigger
  workflow_dispatch:
    inputs:
      suite:
        description: 'Eval suite to run (all, capa, adversarial, crosswalk)'
        required: false
        default: 'all'

permissions:
  contents: read
  pull-requests: write

jobs:
  graph-quality:
    name: Graph Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run graph quality checks
        run: node scripts/check-graph-quality.mjs

  eval:
    name: Run Eval Suites
    runs-on: ubuntu-latest
    needs: graph-quality
    strategy:
      matrix:
        suite: [adversarial, crosswalk, capa]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run eval suite (${{ matrix.suite }})
        run: |
          cd packages/evals
          npx tsx src/runner.ts --suite=${{ matrix.suite }}
        continue-on-error: true

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ matrix.suite }}
          path: packages/evals/reports/
          retention-days: 30

  report:
    name: Post Eval Summary
    runs-on: ubuntu-latest
    needs: eval
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download all eval reports
        uses: actions/download-artifact@v4
        with:
          path: eval-reports/
          pattern: eval-report-*

      - name: Generate diff comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Collect all JSON reports
            const reportsDir = 'eval-reports';
            const reports = [];

            if (fs.existsSync(reportsDir)) {
              const dirs = fs.readdirSync(reportsDir);
              for (const dir of dirs) {
                const dirPath = path.join(reportsDir, dir);
                if (fs.statSync(dirPath).isDirectory()) {
                  const files = fs.readdirSync(dirPath);
                  for (const file of files) {
                    if (file.endsWith('.json')) {
                      const content = fs.readFileSync(path.join(dirPath, file), 'utf-8');
                      try {
                        reports.push(JSON.parse(content));
                      } catch (e) {
                        console.warn(`Failed to parse ${file}: ${e.message}`);
                      }
                    }
                  }
                }
              }
            }

            if (reports.length === 0) {
              console.log('No eval reports found');
              return;
            }

            // Build summary table
            let body = '## Eval Harness Results\n\n';
            body += '| Suite | Passed | Failed | Recall | Citation Acc | Miss Rate |\n';
            body += '|-------|--------|--------|--------|--------------|-----------|\n';

            let totalPassed = 0;
            let totalFailed = 0;

            for (const report of reports) {
              const s = report.summary;
              totalPassed += s.passed;
              totalFailed += s.failed;
              const icon = s.failed === 0 ? ':white_check_mark:' : ':x:';
              body += `| ${icon} ${report.suite} | ${s.passed} | ${s.failed} | `;
              body += `${(s.avgObligationRecall * 100).toFixed(1)}% | `;
              body += `${(s.avgCitationAccuracy * 100).toFixed(1)}% | `;
              body += `${(s.avgMandatoryMissRate * 100).toFixed(1)}% |\n`;
            }

            body += `\n**Total: ${totalPassed} passed, ${totalFailed} failed**\n`;
            body += '\n---\n*Generated by the Regulatory Ground eval harness*';

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## Eval Harness Results';
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
