name: crosswalk
description: >
  Tests cross-regulation accuracy: the system's ability to correctly
  identify related obligations across EU MDR, ISO 13485, ISO 14971,
  21 CFR 820, and other regulations.

prompts:
  - id: xwalk-pms-eu-mdr
    prompt: "What post-market surveillance obligations exist under EU MDR?"
    expected:
      should_contain_obligations:
        - EUMDR.83.OBL.001
      expected_process_type: PMS
      expected_jurisdiction: EU_MDR
      min_citations: 1
    tags: [crosswalk, eu-mdr, pms]

  - id: xwalk-vigilance-eu-mdr
    prompt: "Describe EU MDR vigilance reporting obligations"
    expected:
      should_contain_obligations:
        - EUMDR.87.OBL.001
      expected_process_type: VIGILANCE
      expected_jurisdiction: EU_MDR
      min_citations: 1
    tags: [crosswalk, eu-mdr, vigilance]

  - id: xwalk-clinical-eval
    prompt: "What does EU MDR Article 61 require for clinical evaluation?"
    expected:
      should_contain_obligations:
        - EUMDR.61.OBL.001
        - EUMDR.61.OBL.002
      expected_process_type: CLINICAL_EVALUATION
      expected_jurisdiction: EU_MDR
      min_citations: 2
    tags: [crosswalk, eu-mdr, clinical]

  - id: xwalk-capa-iso-vs-cfr
    prompt: "Compare CAPA requirements between ISO 13485 and 21 CFR 820"
    expected:
      should_contain_obligations:
        - ISO13485.8.5.2.OBL.001
      expected_process_type: CAPA
      min_citations: 1
    tags: [crosswalk, iso-13485, 21-cfr-820, comparison]

  - id: xwalk-design-controls
    prompt: "What design control obligations exist under ISO 13485?"
    expected:
      expected_process_type: DESIGN_CONTROL
      expected_jurisdiction: GLOBAL
      min_citations: 1
    tags: [crosswalk, iso-13485, design]

  - id: xwalk-complaints-global
    prompt: "List complaint handling obligations across all jurisdictions"
    expected:
      expected_process_type: COMPLAINT
      min_citations: 1
    tags: [crosswalk, multi-jurisdiction, complaints]

  - id: xwalk-psur-eu-mdr
    prompt: "What PSUR obligations apply under EU MDR?"
    expected:
      expected_process_type: PSUR
      expected_jurisdiction: EU_MDR
      min_citations: 1
    tags: [crosswalk, eu-mdr, psur]

  - id: xwalk-risk-management-iso14971
    prompt: "Describe risk management obligations under ISO 14971"
    expected:
      expected_process_type: RISK_MANAGEMENT
      expected_jurisdiction: GLOBAL
      min_citations: 1
    tags: [crosswalk, iso-14971, risk]

  - id: xwalk-labeling-eu-mdr
    prompt: "What labeling and IFU requirements does EU MDR impose?"
    expected:
      expected_process_type: LABELING
      expected_jurisdiction: EU_MDR
      min_citations: 1
    tags: [crosswalk, eu-mdr, labeling]

  - id: xwalk-document-control-iso13485
    prompt: "What document control obligations exist in ISO 13485?"
    expected:
      expected_process_type: DOCUMENT_CONTROL
      expected_jurisdiction: GLOBAL
      min_citations: 1
    tags: [crosswalk, iso-13485, document-control]
