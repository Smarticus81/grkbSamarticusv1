  - obligationId: "EUMDR.50.OBL.002"
    kind: obligation
    title: "EU reference laboratory tasks"
    text: "EU reference laboratories shall perform the following tasks: verify the performance of devices by notified bodies through batch testing and review of notified body testing methodologies; provide scientific and technical assistance to the Commission, the MDCG, the competent authorities, and the notified bodies; contribute to the development of common specifications and international standards."
    sourceCitation: "Regulation (EU) 2017/745 Article 50(2)"
