constraints:
  - constraintId: "EUMDR.36.CON.001"
    appliesTo: "EUMDR.36.OBL.002"
    text: "Unannounced audits must be conducted at least once within every five-year certification period. The notified body may not substitute unannounced audits with announced surveillance audits."
    severity: hard

  - constraintId: "EUMDR.36.CON.002"
    appliesTo: "EUMDR.36.OBL.003"
    text: "Surveillance audits shall be conducted at least once per year. An interval exceeding 12 months between consecutive surveillance audits constitutes non-compliance with surveillance requirements."
    severity: hard

  - constraintId: "EUMDR.37.CON.001"
    appliesTo: "EUMDR.37.OBL.003"
    text: "For class III devices, sampling-based technical documentation review is not permitted. Every device file must be individually reviewed by the notified body."
    severity: hard

  - constraintId: "EUMDR.41.CON.001"
    appliesTo: "EUMDR.41.OBL.001"
    text: "The clinical evaluation consultation procedure is mandatory for class III implantable devices and certain class IIb active devices. The notified body may not bypass the expert panel consultation for these device categories."
    severity: hard

  - constraintId: "EUMDR.41.CON.002"
    appliesTo: "EUMDR.41.OBL.002"
    text: "If the expert panel scientific opinion is unfavourable, the notified body shall not issue the certificate unless a full justification for departure from the opinion is documented. Absence of documented justification renders the certificate invalid."
    severity: hard

  - constraintId: "EUMDR.42.CON.001"
    appliesTo: "EUMDR.42.OBL.002"
    text: "Certificate validity shall not exceed five years. Certificates issued for a period exceeding five years are invalid. Renewal requires full re-assessment against applicable conformity assessment procedures."
    severity: hard

  - constraintId: "EUMDR.43.CON.001"
    appliesTo: "EUMDR.43.OBL.001"
    text: "The notified body must provide the manufacturer a defined corrective action period before withdrawal. Immediate withdrawal without opportunity for corrective action is only justified where there is an unacceptable risk to health and safety."
    severity: hard

  - constraintId: "EUMDR.44.CON.001"
    appliesTo: "EUMDR.44.OBL.001"
    text: "The manufacturer must notify the notified body of changes before implementation. Retrospective notification of already-implemented changes constitutes a non-conformity and may lead to certificate suspension."
    severity: hard

  - constraintId: "EUMDR.45.CON.001"
    appliesTo: "EUMDR.45.OBL.002"
    text: "The incoming notified body shall not issue a new certificate until it has obtained and reviewed the complete conformity assessment files from the outgoing notified body. Issuing a certificate without complete documentation constitutes a violation."
    severity: hard

  - constraintId: "EUMDR.49.CON.001"
    appliesTo: "EUMDR.49.OBL.001"
    text: "Fee schedules must be publicly available. A notified body that charges undisclosed fees or fees not aligned with its published fee schedule is in breach of transparency requirements."
    severity: hard

  - constraintId: "EUMDR.50.CON.001"
    appliesTo: "EUMDR.50.OBL.003"
    text: "EU reference laboratories must maintain independence from all economic operators. Any financial relationship, consultancy, or advisory role with a manufacturer, authorised representative, or distributor in the device sector disqualifies the laboratory from its designation."
    severity: hard

definitions:
  - definitionId: "EUMDR.DEF.TYPE_EXAMINATION"
    term: "EU Type-Examination"
    text: "The procedure whereby a notified body ascertains and certifies that a representative sample of the production envisaged meets the relevant provisions of this Regulation."
    sourceCitation: "Regulation (EU) 2017/745 Annex X"

  - definitionId: "EUMDR.DEF.SURVEILLANCE_AUDIT"
    term: "Surveillance Audit"
    text: "A periodic assessment carried out by a notified body to verify that the manufacturer continues to fulfil the requirements of the approved quality management system."
    sourceCitation: "Regulation (EU) 2017/745 Annex IX Section 3"

  - definitionId: "EUMDR.DEF.UNANNOUNCED_AUDIT"
    term: "Unannounced Audit"
    text: "An audit carried out by the notified body without prior notification to the manufacturer, for the purpose of verifying ongoing compliance with the approved quality management system and the conformity of manufactured devices with the technical documentation."
    sourceCitation: "Regulation (EU) 2017/745 Annex IX Section 3.4"

  - definitionId: "EUMDR.DEF.EU_REFERENCE_LABORATORY"
    term: "EU Reference Laboratory"
    text: "A laboratory designated by the Commission to provide scientific and technical assistance to notified bodies, competent authorities, and the Commission, including through batch testing verification and methodology review."
    sourceCitation: "Regulation (EU) 2017/745 Article 100"

  - definitionId: "EUMDR.DEF.EXPERT_PANEL"
    term: "Expert Panel"
    text: "Panels of advisors designated by the Commission to provide views on clinical evaluation assessment reports in the framework of the clinical evaluation consultation procedure for certain high-risk devices."
    sourceCitation: "Regulation (EU) 2017/745 Article 106"

  - definitionId: "EUMDR.DEF.PEER_REVIEW"
    term: "Peer Review"
    text: "A systematic evaluation of the performance of a notified body carried out by a joint assessment team in order to verify continued compliance with the designation requirements and to harmonise assessment practices."
    sourceCitation: "Regulation (EU) 2017/745 Article 47"

