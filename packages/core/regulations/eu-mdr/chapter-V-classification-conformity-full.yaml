    kind: obligation
    title: "EU reference laboratory independence"
    text: "EU reference laboratories shall be independent from manufacturers and other economic operators in the device sector. They shall maintain documented procedures to ensure impartiality and freedom from conflicts of interest in the performance of their tasks."
