regulation: "21 CFR Part 820 (FDA QSR)"
section: "§820.100"
jurisdiction: FDA
processType: CAPA
artifactType: CAPA
version: "1.0.0"
effectiveFrom: "1997-06-01"

obligations:
  - obligationId: "CFR820.100.OBL.001"
    kind: obligation
    title: "Establish CAPA procedures"
    text: "Each manufacturer shall establish and maintain procedures for implementing corrective and preventive action."
    sourceCitation: "21 CFR §820.100(a)"
    mandatory: true
    requiredEvidenceTypes:
      - capa_procedure

  - obligationId: "CFR820.100.OBL.002"
    kind: obligation
    title: "Analyze sources of quality data"
    text: "The procedures shall include analyzing processes, work operations, concessions, quality audit reports, quality records, service records, complaints, returned product, and other sources of quality data to identify existing and potential causes of nonconforming product, or other quality problems."
    sourceCitation: "21 CFR §820.100(a)(1)"
    mandatory: true
    requiredEvidenceTypes:
      - quality_data_analysis

  - obligationId: "CFR820.100.OBL.003"
    kind: obligation
    title: "Document CAPA activities"
    text: "All activities required under this section, and their results, shall be documented."
    sourceCitation: "21 CFR §820.100(b)"
    mandatory: true
    requiredEvidenceTypes:
      - capa_record

relationships:
  - from: "CFR820.100.OBL.001"
    to: "ISO13485.8.5.2.OBL.001"
    type: CROSS_REFERENCES
    props:
      note: "FDA QSR CAPA aligns with ISO 13485 §8.5.2"
